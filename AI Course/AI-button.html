<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Button Practice</title>
  <style>
    .btn-n {
      margin-top: 50px;
      margin-left: 100px;
    }
    .btn-1{
      background-color: blue;
      color: white;
      border: none;
      padding: 15px 30px;
      border-radius: 5px;
      transition: background-color 0.3s linear;
    }
    .btn-1:hover {
      background-color: darkblue;
    }

    .neumorphic{
      display: flex;
      justify-content: center;
      align-items: center;
      margin-top: 50px;
      margin-left: 50px;
      background-color: gray;
      height: 200px;
      width: 200px;
    }

    .neumorphic-btn{
      background-color: grey;
      border: none;
      padding: 15px 30px;
      border-radius: 10px;
      box-shadow: -5px -5px 10px rgba(255, 255, 255, 0.3),
                   5px 5px 10px  rgba(0, 0, 0, 0.3);
      transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);             
    }
    .neumorphic-btn:hover {
      background-color: dimgray;
      transform: scale(0.98);
      box-shadow: inset -5px -5px 10px rgba(255, 255, 255, 0.3),
                  inset  5px  5px 10px rgba(0, 0, 0, 0.3);
    }

    .neon-glow {
      margin-top: 50px;
      margin-left: 50px;
      display: flex;
      justify-content: center;
      align-items: center;
      background-color: #000;
      height: 200px;
      width: 200px;
      
    }
    .btn-2 {
      
      background-color: #000;
      border: 1px solid#00d2ff;
      padding: 10px 30px;
      color: white;
      transition: all 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55);
    }
    .btn-2:hover {
      transform: scale(1.2);
      box-shadow: 0 0 20px #00d2ff;
      color: #00d2ff;
    }

    .floating-card-1 {
      font-family: sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      margin-top: 50px;
      margin-left: 50px;
      height: 200px;
      width: 200px;
      background-color: lightgray;
      border-radius: 10px;
      box-shadow: 0px 5px 10px rgba(0, 0, 0, .1);
      transition: all 0.5s ease-in-out;
    }
    .floating-card-1:hover {
      transform: translateY(-10px) scale(1.05);
      box-shadow: 0px 20px 30px rgba(0, 0, 0, .2);
      font-size: 20px;
    }

    .container-slide-in-reveal {
      height:400px;
      width: 350px;
      background-color: gray;
      display: flex;
      justify-content: center;
      align-items: center;
      margin-top: 50px;
    }
    .slide-in-reveal{
      display: flex;
      justify-content: center;
      align-items: center;
      height: 300px;
      width: 250px;
      background-color: #2c3e50;
      border-radius: 15px;
      overflow: hidden;
      transition: all 0.8s cubic-bezier(0.265, -0.365, 0.88, 1.55);
    }
    .circle {
      height: 20px;
      width: 20px;
      background-color: #ffffff;
      border-radius: 50%;
      transition: all 0.8s cubic-bezier(0.265, -0.365, 0.88, 1.55);
    }
    .slide-in-reveal:hover{
      transform: translateY(-20px);
      box-shadow: 0px 0px 10px 5px rgba(0, 0, 0, 0.3);
    }
    .slide-in-reveal:hover .circle {
      transform: scale(10);
      background-color: #00d2ff;
    }

    .container-atomic-loeder{
      margin-top: 50px;
      height: 300px;
      width: 350px;
      background-color: gray;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .atomic-circle{
      height: 100px;
      width:100px;
      background-color: rgb(0, 0, 0);
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
      transition: all 0.5s cubic-bezier(0.125, 0.125, 0.895, 1.35);
    }
    .atomic-hidden-circle-left,
    .atomic-hidden-circle-bottom,
    .atomic-hidden-circle-top,
    .atomic-hidden-circle-right
    {
      height: 20px;
      width: 20px;
      background-color: white;
      border-radius: 50%;
      position: absolute;
      opacity: 0;
      transition: all 0.5s cubic-bezier(0.125, 0.125, 0.895, 1.35);
    }
    
    .atomic-circle:hover {
      transform: scale(1.1);
      background-color: skyblue;
      box-shadow: 0 0 10px 5px rgba(255, 255, 255, 1);
    }
    .atomic-circle:hover .atomic-hidden-circle-left {
      transform: translateX(-50px) rotate(180deg);
      opacity: 1;
      box-shadow: 0 0 10px 5px rgba(135, 207, 235, 0.596);
    }
    .atomic-circle:hover .atomic-hidden-circle-right {
      transform: translateX(50px) rotate(-180deg);
      box-shadow: 0 0 10px 5px rgba(135, 207, 235, 0.596);
      opacity: 1;
    }
    .atomic-circle:hover .atomic-hidden-circle-top {
      transform: translateY(-50px) rotate(-180deg);
      box-shadow: 0 0 10px 5px rgba(135, 207, 235, 0.596);
      opacity: 1;
    }
    .atomic-circle:hover .atomic-hidden-circle-bottom {
      transform: translateY(50px) rotate(-180deg);
      box-shadow: 0 0 10px 5px rgba(135, 207, 235, 0.596);
      opacity: 1;
    }
    
  </style>
</head>
<body>
  <button class="btn-">
    
  </button>

  <div class="btn-n">
    <button class="btn-1">
      Login
    </button>
  </div>
  

  <div class="neumorphic">
    <button class="neumorphic-btn">
      login
    </button>
  </div>

  <div class="neon-glow">
    <button class="btn-2">
      Login
     </button>
  </div>
  

  <div class="floating-card-1">
    Floating Card
  </div>
  <div class="container-slide-in-reveal">
    <div class="slide-in-reveal">
      <div class="circle">

      </div>
    </div>
  </div>

  <div class="container-atomic-loeder">
    <div class="atomic-circle">
      <div class="atomic-hidden-circle-left">

      </div>
      <div class="atomic-hidden-circle-right">

      </div>
      <div class="atomic-hidden-circle-top">

      </div>
      <div class="atomic-hidden-circle-bottom">

      </div>
    </div>
  </div>


</body>
</html>
