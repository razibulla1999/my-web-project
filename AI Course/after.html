<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>After Effect</title>
  <style>
    .magic-btn {
      position: relative;
      background: none;
      border: none;
      font-size: 18px;
      cursor: pointer;
      padding: 10px 20px;
    }
    .magic-btn::after {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 3px;
      width: 0px;
      background-color: #ff4757;
      transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
    }
    .magic-btn:hover::after {
      width: 100%;
    }
  </style>
</head>
<body>
  <button class="magic-btn">
    Hover Me
  </button>
</body>
</html>
