<!DOCTYPE html>
<html lang="en">
<head>

  <meta description="">
  <meta keywords="">
  <meta author="Razibulla">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <title>Nexus Analytics Dashboard</title>

  <link rel="stylesheet" href="style/general.css">
  <link rel="stylesheet" href="style/sidebar.css">
  <link rel="stylesheet" href="style/header.css">

<body>
<!--Sidebar start -->
  <div class="sidebar">
    <div class="logo"><img src="logo/logo.png" alt=""></div>
    <div class="navbar">
      <ul>
        <li><a href="" class="active"> <i class="fa-solid fa-house"></i> Dashboard</a></li>
        <li><a href=""> <i class="fa-solid fa-chart-line"></i> Analytics</a></li>
        <li><a href=""> <i class="fa-solid fa-users"></i> Users</a></li>
        <li><a href=""> <i class="fa-solid fa-gear"></i> Settings</a></li>
        <li><a href=""> <i class="fa-solid fa-right-from-bracket"></i> Logout</a></li>
      </ul>
    </div>
    <div class="current-user"><img src="logo/current-user.jpg" alt="">Admin</div> 
  </div>
<!-- sidebar end -->

<!-- header start-->
  <div class="header-content">
    <header>
      <div class="left-header">
        <i class="fa-solid fa-magnifying-glass"></i>
        <input type="text" placeholder="Search here......">
      </div>

      <div class="header-right">
        <button class="icon-btn">
            <i class="fa-solid fa-bell"></i>
            <span class="badge"></span>
        </button>
        <button class="icon-btn">
            <i class="fa-solid fa-envelope"></i>
        </button>
        <div class="user-profile">
            <img src="logo/current-user.jpg" alt="Admin">
            <span>Razibulla</span>
        </div>
      </div>
<!-- header end -->
    </header>
  </div>
