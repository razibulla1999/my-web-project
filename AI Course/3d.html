<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D</title>
  <style>
    .y-axis-prnt-div,
    .x-axis-prnt-div,
    .-y-axis-prnt-div,
    .-x-axis-prnt-div
    {
      height: 100px;
      width: 100px;
      background-color: gray;
      display: flex;
      justify-content: center;
      align-items: center;
      margin-bottom: 30px;
      perspective: 1000px;
      
    }
    .y-axis-child-div,
    .x-axis-child-div,
    .-y-axis-child-div,
    .-x-axis-child-div  {
      height: 80px;
      width: 80px;
      display: flex;
      justify-content: center;
      align-items: center;
      background-color: dimgray;
      border-top: .5px solid rgb(109, 201, 230);
      border-bottom: .5px solid rgb(19, 16, 161);
      border-left: .5px solid rgb(54, 158, 98);
      border-right: .5px solid rgb(194, 66, 166);
      box-shadow: 0 0 15px 5px rgba(255, 255, 255, 0.185);
      transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    .y-axis-child-div:hover {
      transform: rotateY(45deg);
    }
    .x-axis-child-div:hover {
      transform: rotatex(45deg);
    }
    .-y-axis-child-div:hover {
      transform: rotateY(-45deg);
    }
    .-x-axis-child-div:hover {
      transform: rotatex(-45deg);
    }
  </style>
</head>
<body>

  <div class="y-axis-prnt-div">
    <div class="y-axis-child-div">
      3D
    </div>
  </div>

  <div class="-y-axis-prnt-div">
    <div class="-y-axis-child-div">
      3D
    </div>
  </div>

  <div class="x-axis-prnt-div">
    <div class="x-axis-child-div">
      3D
    </div>
  </div>


  <div class="-x-axis-prnt-div">
    <div class="-x-axis-child-div">
      3D
    </div>
  </div>


</body>
</html>
