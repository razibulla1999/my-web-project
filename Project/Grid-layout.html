<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grid Layout</title>
  <style>
    body {
      margin: 0;
    }
    .container-1{
      display: grid;
      grid-template-columns: 120px 1fr;
      grid-template-rows: 70px 460px 80px;
      grid-template-areas: "header header"
                            "sidebar main"
                            "footer footer";
      margin-bottom: 100px;
    }
    .header {
      grid-area: header;
      background-color: lightslategray;
    }
    .sidebar {
      grid-area: sidebar;
      background-color: lightcoral;
    }
    .main {
      grid-area: main;
      background-color: darkolivegreen;
    }
    .footer {
      grid-area: footer;
      background-color: hotpink;
      
    }


    .container-2 {
      display: grid;
      grid-template-columns: 200px 1fr 250px;
      grid-template-rows: 80px 400px 100px 60px;
      grid-template-areas: "sidebar header header"
                            "sidebar main-content stats-box"
                            "sidebar bottom-info stats-box"
                            "sidebar footer footer";
      gap: 5px;
    }
    .header-2{
      grid-area:header;
      background-color: blueviolet;
    }
    .sidebar-2{
      grid-area: sidebar;
      background-color: chartreuse;
    }
    .main-content{
      grid-area: main-content;
      background-color: cyan;
    }
    .stats-box{
      grid-area: stats-box;
      background-color: coral;
    }
    .bottom-info{
      grid-area: bottom-info;
      background-color: blue;
    }
    .footer-2{
      grid-area: footer;
      background-color: darkolivegreen;
    }

  </style>  
</head>
<body>
  <div class="container-1">
      <div class="header">Header</div>
      <div class="sidebar">Sidebar</div>
      <div class="main">Main</div>
      <div class="footer">Footer</div>
  </div>

  <div class="container-2">
      <div class="header-2">Header</div>
      <div class="sidebar-2">Sidebar</div>
      <div class="main-content">Main Content</div>
      <div class="stats-box">Stats Box</div>
      <div class="bottom-info">Bottom Info</div>
      <div class="footer-2">Footer</div>
  </div>

</body>
</html>
