<!DOCTYPE html>
<html lang="en">
<head>

  <title>7g</title>
  <style>
    .img-01,
    .input-box,
    .btn-tweet {

    .input-box{

      border: none;

      border: none;
      padding-left: 20px;
      padding-right: 20px;
      padding-top: 8px;
      padding-bottom: 8px;
      border-radius: 30px;
      
    }
  </style>
</head>
<body>
  <img class="img-01" src="Capture.PNG" alt="">
  <input class="input-box" type="text" placeholder="What's happening?">

</html>
